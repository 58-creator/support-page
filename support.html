<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support | 奈良間大己</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a1628;
      --fg: #f0ede8;
      --muted: #6a7a99;
      --border: #1e3052;
      --accent: #c8102e;
      --accent2: #4a7fc1;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      background-image:
        repeating-linear-gradient(-55deg, transparent, transparent 40px, rgba(200,16,46,0.03) 40px, rgba(200,16,46,0.03) 41px),
        repeating-linear-gradient(-55deg, transparent, transparent 80px, rgba(74,127,193,0.04) 80px, rgba(74,127,193,0.04) 81px);
    }

    .container {
      width: 100%;
      max-width: 440px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* Nav */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
    }

    .nav-logo {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-logo:hover { color: var(--fg); }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
    }

    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--accent2);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .plans {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .plan-card {
      border: 1px solid var(--border);
      padding: 1.2rem 1.4rem;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .plan-card:hover { border-color: var(--accent2); }

    .plan-info { flex: 1; }

    .plan-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.95rem;
      margin-bottom: 0.2rem;
    }

    .plan-price {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .btn {
      display: inline-block;
      padding: 0.7rem 1.2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s;
      text-decoration: none;
    }

    .btn-ghost:hover { border-color: var(--accent2); }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.62rem;
      color: #1e3052;
      letter-spacing: 0.08em;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">

    <nav class="nav">
      <a class="nav-logo" href="index.html">← About</a>
    </nav>

    <p class="eyebrow">Support</p>
    <h1>活動を応援する</h1>

    <!-- Membership -->
    <p class="section-label">Membership</p>
    <div class="plans">
      <div class="plan-card">
        <div class="plan-info">
          <p class="plan-name">メンバーシップ</p>
          <p class="plan-price">¥300 / 月</p>
        </div>
        <a class="btn" href="https://buy.stripe.com/test_4gM8wQ1sY3G1aHA0GBejK01" target="_blank">参加する →</a>
      </div>
      <div class="plan-card">
        <div class="plan-info">
          <p class="plan-name">メンバーシップ</p>
          <p class="plan-price">¥3,500 / 年</p>
        </div>
        <a class="btn" href="https://buy.stripe.com/test_14AdRa7Rm5O99Dw893ejK02" target="_blank">参加する →</a>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Support -->
    <p class="section-label">Support</p>
    <a class="btn-ghost" href="https://buy.stripe.com/test_5kQdRa0oU2BXeXQ2OJejK04" target="_blank">Tipで声援を送る / サポートする →</a>

    <p class="footer">Powered by Stripe — 安全な決済</p>
  </div>
</body>
</html>
