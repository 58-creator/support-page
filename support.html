<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support</title>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --fg: #f0ede8;
      --muted: #555;
      --border: #222;
      --accent: #f0ede8;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.6rem;
    }

    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 0.5rem;
      letter-spacing: -0.01em;
    }

    .sub {
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 2.8rem;
    }

    /* Divider */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 2rem 0;
    }

    /* Section label */
    .section-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* Membership card */
    .membership-card {
      border: 1px solid var(--border);
      padding: 1.4rem 1.6rem;
      margin-bottom: 1rem;
      position: relative;
      transition: border-color 0.2s;
    }

    .membership-card:hover { border-color: #444; }

    .membership-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.4rem;
    }

    .membership-name {
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
    }

    .membership-price {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .membership-desc {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.2rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.85rem;
      background: var(--fg);
      color: var(--bg);
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border);
      transition: border-color 0.2s, opacity 0.2s;
    }

    .btn-ghost:hover { border-color: #555; opacity: 0.85; }

    /* Tip section */
    .tip-section { margin-top: 0; }

    .tip-amounts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tip-btn {
      padding: 0.65rem 0;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .tip-btn:hover, .tip-btn.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    .tip-custom {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tip-input-wrap {
      flex: 1;
      position: relative;
    }

    .tip-input-wrap span {
      position: absolute;
      left: 0.9rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.78rem;
      color: var(--muted);
      pointer-events: none;
    }

    .tip-input {
      width: 100%;
      padding: 0.75rem 0.9rem 0.75rem 1.6rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .tip-input:focus { border-color: #555; }
    .tip-input::placeholder { color: var(--muted); }

    .tip-input::-webkit-outer-spin-button,
    .tip-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.62rem;
      color: #333;
      letter-spacing: 0.08em;
      text-align: center;
    }

    /* Error */
    .error-msg {
      font-size: 0.68rem;
      color: #888;
      margin-top: -0.5rem;
      margin-bottom: 0.8rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="eyebrow"><a href="index.html" style="color:#6a7a99;text-decoration:none;font-size:0.65rem;letter-spacing:0.15em;">← About</a></p>
    <p class="eyebrow" style="margin-top:0.5rem;">Support</p>
    <h1>活動を応援する</h1>
    <p class="sub">メンバーシップに参加するか、<br>気持ちだけ投げ銭してください。</p>

    <!-- Membership -->
    <p class="section-label">Membership</p>
    <div class="membership-card">
      <div class="membership-top">
        <span class="membership-name">メンバーシップ</span>
        <span class="membership-price">¥300 / 月</span>
      </div>
      <p class="membership-desc">限定コンテンツへのアクセス権。<br>いつでもキャンセル可能。</p>
      <a class="btn" href="https://buy.stripe.com/test_14AdRa7Rm5O99Dw893ejK02" target="_blank">参加する →</a>
    </div>

    <div class="divider"></div>

    <!-- Tip -->
    <div class="tip-section">
      <p class="section-label">お気持ちサポート</p>
      <div class="tip-amounts">
        <button class="tip-btn" onclick="selectAmount(300)">¥300</button>
        <button class="tip-btn" onclick="selectAmount(500)">¥500</button>
        <button class="tip-btn" onclick="selectAmount(1000)">¥1,000</button>
        <button class="tip-btn" onclick="selectAmount(3000)">¥3,000</button>
      </div>
      <div class="tip-custom">
        <div class="tip-input-wrap">
          <span>¥</span>
          <input class="tip-input" id="tipAmount" type="number" placeholder="金額を入力" min="100">
        </div>
      </div>
      <p class="error-msg" id="errorMsg">¥100以上で入力してください</p>
      <button class="btn btn-ghost" onclick="goTip()">投げ銭する →</button>
    </div>

    <p class="footer">Powered by Stripe — 安全な決済</p>
  </div>

  <script>
    const TIP_BASE_URL = 'https://buy.stripe.com/test_4gM8wQ1sY3G1aHA0GBejK01';

    function selectAmount(amount) {
      document.getElementById('tipAmount').value = amount;
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('errorMsg').style.display = 'none';
    }

    document.getElementById('tipAmount').addEventListener('input', function() {
      document.querySelectorAll('.tip-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('errorMsg').style.display = 'none';
    });

    function goTip() {
      const amount = parseInt(document.getElementById('tipAmount').value);
      if (!amount || amount < 100) {
        document.getElementById('errorMsg').style.display = 'block';
        return;
      }
      // Stripeのprefilled_amountパラメータで金額を渡す（円→最小単位は円なのでそのまま）
      window.open(`${TIP_BASE_URL}?prefilled_amount=${amount * 100}`, '_blank');
    }
  </script>
</body>
</html>
